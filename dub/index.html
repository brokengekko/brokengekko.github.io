<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Upscaler 2x</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #0ff;
            --neon-pink: #f0f;
            --neon-yellow: #ff0;
            --dark-bg: #090a0f;
            --panel-bg: rgba(16, 18, 27, 0.85);
            --grid-color: rgba(0, 255, 255, 0.05);
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            /* Cyberpunk grid background */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
        }

        /* CRT Scanline overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .container {
            background-color: var(--panel-bg);
            padding: 2.5rem;
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.1), inset 0 0 20px rgba(0, 255, 255, 0.05);
            text-align: center;
            width: 90%;
            max-width: 550px;
            position: relative;
            z-index: 10;
            /* Angled corners simulation */
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            backdrop-filter: blur(5px);
        }

        /* Tech corner accents */
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 30px; height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .container::after {
            content: '';
            position: absolute;
            bottom: 0; right: 20px;
            width: 30px; height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 0 5px var(--neon-cyan), 0 0 10px var(--neon-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .subtitle {
            color: var(--neon-cyan);
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 2rem;
            font-family: 'Orbitron', sans-serif;
            opacity: 0.8;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
            width: 100%;
        }

        .file-upload-wrapper {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload-wrapper input[type=file] {
            font-size: 100px;
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            cursor: pointer;
            height: 100%;
            z-index: 5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            text-decoration: none;
            position: relative;
            z-index: 1;
            background: transparent;
        }

        .btn-primary {
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2) inset, 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan) inset, 0 0 20px var(--neon-cyan);
        }

        .btn-success {
            border: 2px solid var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.2) inset, 0 0 10px rgba(255, 0, 255, 0.2);
        }

        .btn-success:hover:not(.disabled) {
            background-color: var(--neon-pink);
            color: #000;
            box-shadow: 0 0 20px var(--neon-pink) inset, 0 0 20px var(--neon-pink);
        }

        .btn:disabled, .btn.disabled {
            border-color: #333;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
            background: rgba(255,255,255,0.02);
        }

        /* Progress Bar Styles */
        .progress-container {
            width: 100%;
            height: 0.75rem;
            background-color: #000;
            border: 1px solid var(--neon-cyan);
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            overflow: hidden;
            display: none;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--neon-cyan);
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px var(--neon-cyan);
            position: relative;
        }
        
        /* Glitch effect on progress bar */
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.25) 10px,
                rgba(0,0,0,0.25) 20px
            );
        }

        .status-text {
            font-size: 0.9rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            margin-top: 0.5rem;
            display: none;
            height: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        /* Preview area */
        .preview-area {
            margin-top: 2rem;
            width: 100%;
            border: 1px solid var(--neon-pink);
            padding: 1rem;
            display: none;
            flex-direction: column;
            align-items: center;
            background-color: rgba(255, 0, 255, 0.05);
            position: relative;
            box-shadow: inset 0 0 15px rgba(255, 0, 255, 0.1);
        }
        
        /* HUD brackets for preview */
        .preview-area::before, .preview-area::after {
            content: '';
            position: absolute;
            width: 15px; height: 15px;
            border: 2px solid var(--neon-pink);
        }
        .preview-area::before {
            top: -1px; left: -1px;
            border-right: none; border-bottom: none;
        }
        .preview-area::after {
            bottom: -1px; right: -1px;
            border-left: none; border-top: none;
        }
        
        .preview-area p {
            font-size: 0.85rem;
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-pink);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
        }

        .image-preview {
            max-width: 100%;
            max-height: 200px;
            object-fit: contain;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.8);
        }
        
        .sys-text {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--dark-bg);
            padding: 0 5px;
            font-size: 0.7rem;
            color: var(--neon-yellow);
            font-family: 'Orbitron', sans-serif;
            border: 1px solid var(--neon-yellow);
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="sys-text">SYS.UPLINK_ESTABLISHED</div>
        <h1>Neural Upscaler</h1>
        
        <p class="subtitle">ENHANCE RESOLUTION VIA MATRICIAL INTERPOLATION</p>

        <div class="btn-group">
            <div class="file-upload-wrapper">
                <button class="btn btn-primary" id="uploadBtnText">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    [ SELECT DATA TARGET ]
                </button>
                <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp" />
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="status-text" id="statusText">AWAITING INPUT...</div>

            <a id="downloadBtn" class="btn btn-success disabled" download="enhanced_data.png">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                [ DOWNLOAD ENHANCED DATA ]
            </a>
        </div>

        <div class="preview-area" id="previewArea">
            <p id="previewLabel">SOURCE DATA</p>
            <img id="previewImage" class="image-preview" src="" alt="Preview" />
        </div>
    </div>

    <!-- Hidden canvas elements for image processing -->
    <canvas id="sourceCanvas" style="display:none;"></canvas>
    <canvas id="targetCanvas" style="display:none;"></canvas>

    <script>
        const imageInput = document.getElementById('imageInput');
        const uploadBtnText = document.getElementById('uploadBtnText');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        
        const previewArea = document.getElementById('previewArea');
        const previewImage = document.getElementById('previewImage');
        const previewLabel = document.getElementById('previewLabel');

        const sourceCanvas = document.getElementById('sourceCanvas');
        const targetCanvas = document.getElementById('targetCanvas');
        const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });
        const targetCtx = targetCanvas.getContext('2d');

        // Target scale factor
        const SCALE_FACTOR = 2;

        imageInput.addEventListener('change', handleImageUpload);

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Check if it's an image
            if (!file.type.startsWith('image/')) {
                alert('Please upload an image file (PNG, JPEG, etc.).');
                return;
            }

            // Reset UI state
            resetUI();
            
            // Disable input during processing
            imageInput.disabled = true;
            uploadBtnText.innerHTML = '[ PROCESSING... ]';
            uploadBtnText.classList.add('disabled');
            document.querySelector('.file-upload-wrapper').style.cursor = 'not-allowed';

            // Show progress elements
            progressContainer.style.display = 'block';
            statusText.style.display = 'block';
            statusText.style.color = 'var(--neon-cyan)';
            statusText.innerText = 'ESTABLISHING NEURAL LINK...';

            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    // Show original image preview
                    previewArea.style.display = 'flex';
                    previewImage.src = e.target.result;
                    previewLabel.innerText = `SRC_RES: ${img.width}x${img.height}`;

                    // Start processing
                    processImage(img);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function resetUI() {
            downloadBtn.classList.add('disabled');
            downloadBtn.removeAttribute('href');
            progressBar.style.width = '0%';
            statusText.innerText = '';
            progressContainer.style.display = 'none';
            statusText.style.display = 'none';
        }

        function processImage(img) {
            statusText.innerText = 'INITIALIZING MATRICES...';

            // Set source canvas dimensions
            const width = img.width;
            const height = img.height;
            sourceCanvas.width = width;
            sourceCanvas.height = height;

            // Draw original image to source canvas
            sourceCtx.drawImage(img, 0, 0);

            // Get source image data
            const sourceData = sourceCtx.getImageData(0, 0, width, height);

            // Set target canvas dimensions (2x)
            const newWidth = width * SCALE_FACTOR;
            const newHeight = height * SCALE_FACTOR;
            targetCanvas.width = newWidth;
            targetCanvas.height = newHeight;

            // Create target image data
            const targetData = targetCtx.createImageData(newWidth, newHeight);

            statusText.innerText = 'EXECUTING BILINEAR INTERPOLATION...';
            
            // Use requestAnimationFrame to avoid freezing the UI completely
            // We'll process the image in chunks (rows)
            let currentRow = 0;
            const rowsPerChunk = 10; // Adjust for performance vs UI responsiveness

            function processChunk() {
                const endRow = Math.min(currentRow + rowsPerChunk, newHeight);
                
                // Process a batch of rows
                for (let y = currentRow; y < endRow; y++) {
                    for (let x = 0; x < newWidth; x++) {
                        
                        // Map target pixel (x,y) back to source coordinate space
                        const gx = x / SCALE_FACTOR;
                        const gy = y / SCALE_FACTOR;
                        
                        // Get the integer coordinates of the top-left pixel
                        const gxi = Math.floor(gx);
                        const gyi = Math.floor(gy);
                        
                        // Calculate the fractional distances
                        const dx = gx - gxi;
                        const dy = gy - gyi;

                        // Ensure we don't read out of bounds
                        const x1 = Math.min(gxi, width - 1);
                        const y1 = Math.min(gyi, height - 1);
                        const x2 = Math.min(gxi + 1, width - 1);
                        const y2 = Math.min(gyi + 1, height - 1);

                        // Calculate indices in the flat pixel array
                        // RGBA means 4 values per pixel
                        const idx11 = (y1 * width + x1) * 4; // Top-left
                        const idx12 = (y2 * width + x1) * 4; // Bottom-left
                        const idx21 = (y1 * width + x2) * 4; // Top-right
                        const idx22 = (y2 * width + x2) * 4; // Bottom-right
                        
                        const targetIdx = (y * newWidth + x) * 4;

                        // Perform bilinear interpolation for each color channel (R, G, B, A)
                        for (let c = 0; c < 4; c++) {
                            // Fetch values of the 4 surrounding pixels
                            const val11 = sourceData.data[idx11 + c];
                            const val12 = sourceData.data[idx12 + c];
                            const val21 = sourceData.data[idx21 + c];
                            const val22 = sourceData.data[idx22 + c];

                            // Interpolate horizontally first
                            const valTop = val11 * (1 - dx) + val21 * dx;
                            const valBottom = val12 * (1 - dx) + val22 * dx;

                            // Interpolate vertically
                            const finalVal = valTop * (1 - dy) + valBottom * dy;

                            // Assign to target
                            targetData.data[targetIdx + c] = finalVal;
                        }
                    }
                }

                currentRow = endRow;

                // Update progress
                const progress = (currentRow / newHeight) * 100;
                progressBar.style.width = `${progress}%`;
                statusText.innerText = `INTERPOLATING... ${Math.round(progress)}%`;

                if (currentRow < newHeight) {
                    // Schedule next chunk
                    requestAnimationFrame(processChunk);
                } else {
                    // Processing finished
                    finalizeProcessing(targetData, newWidth, newHeight);
                }
            }

            // Start processing
            requestAnimationFrame(processChunk);
        }

        function finalizeProcessing(targetData, newWidth, newHeight) {
            statusText.innerText = 'FINALIZING DATA...';

            // Put the newly created image data onto the target canvas
            targetCtx.putImageData(targetData, 0, 0);

            // Convert target canvas to data URL for download
            targetCanvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                
                // Update UI for completion
                progressContainer.style.display = 'none';
                statusText.style.display = 'block';
                statusText.innerText = 'PROCESS COMPLETE. AWAITING EXTRACTION.';
                statusText.style.color = 'var(--neon-pink)'; 
                
                // Enable download button
                downloadBtn.href = url;
                downloadBtn.classList.remove('disabled');
                
                // Update preview to show new image
                previewImage.src = targetCanvas.toDataURL();
                previewLabel.innerText = `ENHANCED_RES: ${newWidth}x${newHeight}`;
                
                // Reset upload button state so user can upload another
                imageInput.disabled = false;
                imageInput.value = ''; // clear input
                uploadBtnText.innerHTML = `
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                    [ SELECT NEW TARGET ]
                `;
                uploadBtnText.classList.remove('disabled');
                document.querySelector('.file-upload-wrapper').style.cursor = 'pointer';

            }, 'image/png'); // Defaulting to PNG output for lossless quality
        }

    </script>
</body>
</html>
