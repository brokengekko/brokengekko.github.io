<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimalist List Randomizer</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .mono-font {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between selection:bg-indigo-100 selection:text-indigo-900">

    <!-- Toast Notification (Top Center) -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-50 transform -translate-y-4 opacity-0 pointer-events-none transition-all duration-300 ease-out">
        <div class="bg-slate-900 text-white px-5 py-3 rounded-full shadow-xl flex items-center gap-3 text-sm font-medium">
            <svg class="w-5 h-5 text-emerald-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="toast-message">Copied to clipboard!</span>
        </div>
    </div>

    <!-- Main Content Container -->
    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6">
        <div class="w-full max-w-5xl bg-white border border-slate-200/80 rounded-2xl shadow-sm p-6 sm:p-8 md:p-10 flex flex-col gap-8">
            
            <!-- Header Section -->
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 border-b border-slate-100 pb-6">
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-900 flex items-center gap-2">
                        <span class="bg-indigo-50 text-indigo-600 p-1.5 rounded-lg">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                            </svg>
                        </span>
                        Shuffler
                    </h1>
                    <p class="text-sm text-slate-500 mt-1">Paste a list, randomize instantly, and export.</p>
                </div>
                
                <!-- Quick Reset / Clear Button -->
                <button id="clear-btn" class="self-end sm:self-auto text-xs font-semibold text-slate-500 hover:text-rose-600 transition-colors flex items-center gap-1.5 px-3 py-1.5 hover:bg-rose-50 rounded-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                    Clear All
                </button>
            </div>

            <!-- Editor Fields (Side-by-Side Grid) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Input Column -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center px-1">
                        <label for="input-list" class="text-xs font-bold uppercase tracking-wider text-slate-400">Original List</label>
                        <span id="input-count" class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">0 lines</span>
                    </div>
                    <div class="relative">
                        <textarea 
                            id="input-list" 
                            class="w-full h-80 sm:h-96 p-4 mono-font text-sm bg-slate-50/50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all outline-none resize-none placeholder-slate-400"
                            placeholder="Enter or paste your list here...&#10;Each item on a new line.&#10;&#10;Example:&#10;Apple&#10;Banana&#10;Cherry&#10;Dragonfruit"
                        ></textarea>
                    </div>
                </div>

                <!-- Output Column -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center px-1">
                        <label for="output-list" class="text-xs font-bold uppercase tracking-wider text-slate-400">Randomized List</label>
                        <span id="output-count" class="text-xs font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">0 lines</span>
                    </div>
                    <div class="relative">
                        <textarea 
                            id="output-list" 
                            class="w-full h-80 sm:h-96 p-4 mono-font text-sm bg-slate-50/20 border border-slate-200 rounded-xl outline-none resize-none placeholder-slate-400 cursor-not-allowed"
                            placeholder="Your randomized items will appear here..."
                            readonly
                        ></textarea>
                    </div>
                </div>

            </div>

            <!-- Actions Bar -->
            <div class="flex flex-col sm:flex-row items-center gap-4 pt-4 border-t border-slate-100">
                
                <!-- Randomize Button (Primary) -->
                <button 
                    id="randomize-btn" 
                    class="w-full sm:w-auto flex-1 bg-indigo-600 hover:bg-indigo-700 active:scale-[0.98] text-white font-semibold px-6 py-4 rounded-xl shadow-lg shadow-indigo-100 hover:shadow-indigo-200 transition-all flex items-center justify-center gap-2"
                >
                    <svg class="w-5 h-5 animate-spin-hover" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.5M7 17a5 5 0 110-10"></path>
                    </svg>
                    Randomize Order
                </button>

                <!-- Copy to Clipboard Button (Secondary) -->
                <button 
                    id="copy-btn" 
                    class="w-full sm:w-auto bg-slate-100 hover:bg-slate-200 active:scale-[0.98] text-slate-700 font-semibold px-6 py-4 rounded-xl transition-all flex items-center justify-center gap-2 border border-slate-200/50"
                    disabled
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path>
                    </svg>
                    Copy Output
                </button>

            </div>

        </div>
    </main>

    <!-- Simple Elegant Footer -->
    <footer class="w-full text-center py-6 border-t border-slate-200/40 text-xs text-slate-400">
        <p>&copy; Minimalist List Shuffler. Fully client-side, secure, and private.</p>
    </footer>

    <!-- Logic Script -->
    <script>
        // DOM Elements
        const inputList = document.getElementById('input-list');
        const outputList = document.getElementById('output-list');
        const inputCount = document.getElementById('input-count');
        const outputCount = document.getElementById('output-count');
        const randomizeBtn = document.getElementById('randomize-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');

        // Helper: Parse text area to line array (filtering out trailing/leading empty blocks)
        function getLines(text) {
            if (!text.trim()) return [];
            return text.split('\n').map(line => line.trim()).filter(line => line !== "");
        }

        // Display Custom Toast Alert
        function showToast(message, isError = false) {
            toastMessage.textContent = message;
            
            // Adjust styling based on status
            const innerToast = toast.firstElementChild;
            if (isError) {
                innerToast.classList.add('bg-rose-950', 'text-rose-200');
                innerToast.classList.remove('bg-slate-900', 'text-white');
            } else {
                innerToast.classList.remove('bg-rose-950', 'text-rose-200');
                innerToast.classList.add('bg-slate-900', 'text-white');
            }

            // Animation classes
            toast.classList.remove('opacity-0', '-translate-y-4', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', '-translate-y-4', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        // Live Line Counter
        function updateCounters() {
            const inLines = getLines(inputList.value);
            const outLines = getLines(outputList.value);
            
            inputCount.textContent = `${inLines.length} line${inLines.length === 1 ? '' : 's'}`;
            outputCount.textContent = `${outLines.length} line${outLines.length === 1 ? '' : 's'}`;

            // Handle copy button state
            if (outLines.length > 0) {
                copyBtn.disabled = false;
                copyBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                copyBtn.disabled = true;
                copyBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        // Fisher-Yates Shuffle Algorithm
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;

            while (currentIndex !== 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;

                // Swap elements
                [array[currentIndex], array[randomIndex]] = [
                    array[randomIndex], array[currentIndex]
                ];
            }

            return array;
        }

        // Randomize Action
        randomizeBtn.addEventListener('click', () => {
            const lines = getLines(inputList.value);

            if (lines.length === 0) {
                showToast("Please enter some items to randomize.", true);
                return;
            }

            // Shuffle lines
            const randomized = shuffle([...lines]);
            
            // Display to output
            outputList.value = randomized.join('\n');
            updateCounters();

            // Add subtle pulse feedback to the output
            outputList.classList.add('ring-2', 'ring-indigo-500/20');
            setTimeout(() => {
                outputList.classList.remove('ring-2', 'ring-indigo-500/20');
            }, 300);
        });

        // Copy To Clipboard Action (With iframe safe compatibility)
        copyBtn.addEventListener('click', () => {
            if (!outputList.value.trim()) return;

            try {
                outputList.select();
                outputList.setSelectionRange(0, 99999); // Mobile compatibility

                // Using standard document copy command for reliable sandbox container execution
                const successful = document.execCommand('copy');
                
                // Clear active text selection focus
                window.getSelection().removeAllRanges();
                outputList.blur();

                if (successful) {
                    showToast("Successfully copied to clipboard!");
                } else {
                    throw new Error("Copy command failed");
                }
            } catch (err) {
                showToast("Failed to copy. Try selecting manual copy.", true);
            }
        });

        // Clear Action
        clearBtn.addEventListener('click', () => {
            inputList.value = "";
            outputList.value = "";
            updateCounters();
            showToast("Lists cleared");
        });

        // Event listeners for counter checks
        inputList.addEventListener('input', updateCounters);
        
        // Init counter setup on load
        updateCounters();
    </script>
</body>
</html>
