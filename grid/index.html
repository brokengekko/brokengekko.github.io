<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL GRID // Collage Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Cyberpunk Theme Styles */
        :root {
            --bg-color: #030307;
            --grid-color: rgba(0, 243, 255, 0.1);
            --accent-cyan: #00f3ff;
            --accent-pink: #ff003c;
            --accent-yellow: #fcee0a;
            --text-main: #e0e0e0;
        }

        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            overflow-x: hidden;
            position: relative;
        }

        /* CRT Scanline Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 50;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        /* Background Grid */
        .cyber-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 1000px; }
        }

        /* Cyber Buttons */
        .cyber-btn {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 10px 20px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        .cyber-btn:hover {
            background: var(--accent-cyan);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-cyan);
        }

        .cyber-btn.pink {
            border-color: var(--accent-pink);
            color: var(--accent-pink);
        }
        .cyber-btn.pink:hover {
            background: var(--accent-pink);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-pink);
        }

        .cyber-btn.yellow {
            border-color: var(--accent-yellow);
            color: var(--accent-yellow);
        }
        .cyber-btn.yellow:hover {
            background: var(--accent-yellow);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--accent-yellow);
        }

        /* Drag & Drop Zone */
        .drop-zone {
            border: 2px dashed var(--accent-pink);
            background: rgba(255, 0, 60, 0.05);
            transition: all 0.3s;
        }
        .drop-zone.dragover {
            background: rgba(255, 0, 60, 0.2);
            border-style: solid;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.5) inset;
        }

        /* Title Glitch */
        .glitch-text {
            position: relative;
            color: white;
            text-shadow: 0.05em 0 0 var(--accent-pink), -0.025em -0.05em 0 var(--accent-cyan),
                         0.025em 0.05em 0 var(--accent-yellow);
            animation: glitch 1s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 var(--accent-pink), -0.05em -0.025em 0 var(--accent-cyan), -0.025em 0.05em 0 var(--accent-yellow); }
            14% { text-shadow: 0.05em 0 0 var(--accent-pink), -0.05em -0.025em 0 var(--accent-cyan), -0.025em 0.05em 0 var(--accent-yellow); }
            15% { text-shadow: -0.05em -0.025em 0 var(--accent-pink), 0.025em 0.025em 0 var(--accent-cyan), -0.05em -0.05em 0 var(--accent-yellow); }
            49% { text-shadow: -0.05em -0.025em 0 var(--accent-pink), 0.025em 0.025em 0 var(--accent-cyan), -0.05em -0.05em 0 var(--accent-yellow); }
            50% { text-shadow: 0.025em 0.05em 0 var(--accent-pink), 0.05em 0 0 var(--accent-cyan), 0 -0.05em 0 var(--accent-yellow); }
            99% { text-shadow: 0.025em 0.05em 0 var(--accent-pink), 0.05em 0 0 var(--accent-cyan), 0 -0.05em 0 var(--accent-yellow); }
            100% { text-shadow: -0.025em 0 0 var(--accent-pink), -0.025em -0.025em 0 var(--accent-cyan), -0.025em -0.05em 0 var(--accent-yellow); }
        }

        /* Canvas Container */
        #canvas-container {
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
            border: 1px solid var(--accent-cyan);
            padding: 5px;
            background: rgba(0, 243, 255, 0.05);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
        }

        /* Message Box */
        #msg-box {
            display: none;
            border-left: 4px solid var(--accent-yellow);
            background: rgba(252, 238, 10, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 sm:p-8">

    <div class="cyber-grid"></div>

    <!-- Header -->
    <header class="w-full max-w-5xl mb-8 text-center sm:text-left flex flex-col sm:flex-row justify-between items-center z-10">
        <div>
            <h1 class="text-4xl sm:text-5xl font-bold glitch-text uppercase tracking-widest mb-2">Neural Grid</h1>
            <p class="text-sm text-cyan-400 opacity-80 uppercase tracking-wider">Visual Data Assembler // v1.0.4</p>
        </div>
        
        <!-- Controls (Hidden initially, shown when canvas is active) -->
        <div id="controls-panel" class="hidden flex-wrap gap-4 mt-6 sm:mt-0 justify-center">
            <button id="btn-shuffle" class="cyber-btn yellow">
                <span class="mr-2">⟳</span> Shuffle
            </button>
            <button id="btn-download" class="cyber-btn">
                <span class="mr-2">↓</span> Download
            </button>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="w-full max-w-5xl flex-grow flex flex-col items-center justify-center relative z-10">
        
        <!-- Message Alert -->
        <div id="msg-box" class="w-full p-4 mb-6 text-yellow-400 font-bold uppercase tracking-wider">
            <span id="msg-text">System message here.</span>
        </div>

        <!-- Drag & Drop Zone -->
        <div id="upload-zone" class="drop-zone w-full p-12 sm:p-24 flex flex-col items-center justify-center text-center cursor-pointer relative overflow-hidden">
            <div class="absolute inset-0 bg-pink-500 opacity-5"></div>
            <svg class="w-16 h-16 text-pink-500 mb-6 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
            </svg>
            <h2 class="text-2xl font-bold text-pink-400 mb-4 relative z-10">Initialize Data Upload</h2>
            <p class="text-gray-400 mb-8 relative z-10">Drag and drop <span class="text-white font-bold">4 to 9</span> image files here, or click to browse system drives.</p>
            
            <button class="cyber-btn pink relative z-10 pointer-events-none">
                Select Files
            </button>
            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20" multiple accept="image/*">
        </div>

        <!-- Canvas Area -->
        <div id="canvas-container" class="hidden w-full max-w-4xl relative">
            <div class="absolute top-0 left-0 bg-cyan-500 text-black px-2 py-1 text-xs font-bold uppercase tracking-widest z-10">Compiled Matrix</div>
            <canvas id="collage-canvas"></canvas>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full text-center mt-12 text-xs text-gray-600 uppercase tracking-widest z-10 pb-4">
        © 2026 // Megacorp Data Division // Unauthorized duplication is punishable by zeroization.
    </footer>

    <script>
        // --- Core Application Logic --- //
        
        const fileInput = document.getElementById('file-input');
        const uploadZone = document.getElementById('upload-zone');
        const canvasContainer = document.getElementById('canvas-container');
        const canvas = document.getElementById('collage-canvas');
        const ctx = canvas.getContext('2d');
        const controlsPanel = document.getElementById('controls-panel');
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnDownload = document.getElementById('btn-download');
        const msgBox = document.getElementById('msg-box');
        const msgText = document.getElementById('msg-text');

        let loadedImages = []; // Array of objects: { img: ImageElement, originalRatio: number }
        
        // --- UI Feedback Functions --- //
        function showMessage(msg, isError = true) {
            msgText.textContent = msg;
            msgBox.style.display = 'block';
            msgBox.style.borderColor = isError ? 'var(--accent-pink)' : 'var(--accent-yellow)';
            msgBox.style.color = isError ? 'var(--accent-pink)' : 'var(--accent-yellow)';
            setTimeout(() => { msgBox.style.display = 'none'; }, 5000);
        }

        function setAppState(mode) {
            if (mode === 'upload') {
                uploadZone.classList.remove('hidden');
                canvasContainer.classList.add('hidden');
                controlsPanel.classList.add('hidden');
                loadedImages = [];
                fileInput.value = '';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            } else if (mode === 'preview') {
                uploadZone.classList.add('hidden');
                canvasContainer.classList.remove('hidden');
                controlsPanel.classList.remove('hidden');
                msgBox.style.display = 'none';
            }
        }

        // --- File Handling --- //
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        async function handleFiles(fileList) {
            const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
            
            if (files.length < 4 || files.length > 9) {
                showMessage(`Error: System requires 4 to 9 images. Detected ${files.length}.`);
                return;
            }

            loadedImages = [];
            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        loadedImages.push({
                            img: img,
                            ratio: img.width / img.height
                        });
                        loadedCount++;
                        if (loadedCount === files.length) {
                            processCollage();
                        }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        // --- Collage Generation Logic --- //

        // Shuffle array helper
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        // Main processing function
        function processCollage() {
            if (loadedImages.length === 0) return;
            setAppState('preview');
            drawGrid();
        }

        function drawGrid() {
            // Configuration
            const CELL_SIZE = 400; // Resolution of a 1x1 block
            const BORDER = 15;     // White border width
            
            // Determine columns based on item count to keep it somewhat balanced
            const numImages = loadedImages.length;
            let cols = 3;
            if (numImages === 4) cols = 2; // Forms a 2x2 grid
            else if (numImages === 7 || numImages === 8) cols = 4; // Forms wider grids
            // 5, 6, and 9 will default to 3 columns (9 forms a 3x3 grid)

            // Packing algorithm to determine grid coordinates
            const layout = calculateLayout(loadedImages, cols);
            
            // Setup Canvas size
            canvas.width = layout.cols * CELL_SIZE + (layout.cols + 1) * BORDER;
            canvas.height = layout.rows * CELL_SIZE + (layout.rows + 1) * BORDER;

            // Draw Background (The White Border)
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw Images
            layout.items.forEach(item => {
                const targetX = BORDER + item.x * (CELL_SIZE + BORDER);
                const targetY = BORDER + item.y * (CELL_SIZE + BORDER);
                const targetW = item.w * CELL_SIZE + (item.w - 1) * BORDER;
                const targetH = item.h * CELL_SIZE + (item.h - 1) * BORDER;

                drawImageCover(ctx, item.img, targetX, targetY, targetW, targetH);
            });
        }

        // Greedy Packing Algorithm
        function calculateLayout(images, cols) {
            const grid = {}; // Track occupied cells: 'x,y' -> true
            const isOccupied = (x, y) => !!grid[`${x},${y}`];
            const markOccupied = (x, y, w, h) => {
                for (let i = 0; i < w; i++) {
                    for (let j = 0; j < h; j++) {
                        grid[`${x + i},${y + j}`] = true;
                    }
                }
            };

            const items = [];
            let maxRow = 0;

            images.forEach(imgObj => {
                // Determine desired shape based on aspect ratio rules
                let desiredW = 1, desiredH = 1;
                if (imgObj.ratio > 1.25) {
                    desiredW = 2; // Landscape
                } else if (imgObj.ratio < 0.8) {
                    desiredH = 2; // Portrait
                }

                let c = 0, r = 0;
                let placed = false;

                // Find next available cell
                while (!placed) {
                    while (isOccupied(c, r)) {
                        c++;
                        if (c >= cols) { c = 0; r++; }
                    }

                    // Check if desired shape fits starting at (c, r)
                    let fits = true;
                    if (c + desiredW > cols) {
                        fits = false; // Exceeds right edge
                    } else {
                        // Check all required cells
                        for (let i = 0; i < desiredW; i++) {
                            for (let j = 0; j < desiredH; j++) {
                                if (isOccupied(c + i, r + j)) fits = false;
                            }
                        }
                    }

                    if (fits) {
                        items.push({ img: imgObj.img, x: c, y: r, w: desiredW, h: desiredH });
                        markOccupied(c, r, desiredW, desiredH);
                        placed = true;
                    } else {
                        // Fallback: If it doesn't fit in the FIRST available hole, 
                        // force it to be 1x1 to ensure grid completion without hanging.
                        desiredW = 1;
                        desiredH = 1;
                        // The while loop will re-check the same (c,r) which is guaranteed to be empty.
                    }
                }
            });

            // Calculate total rows needed
            items.forEach(item => {
                if (item.y + item.h > maxRow) maxRow = item.y + item.h;
            });

            return { items, cols, rows: maxRow };
        }

        // Draw image mimicking CSS object-fit: cover
        function drawImageCover(ctx, img, x, y, w, h) {
            const imgRatio = img.width / img.height;
            const targetRatio = w / h;
            
            let sx, sy, sw, sh;

            if (imgRatio > targetRatio) {
                // Image is wider than target area (crop sides)
                sh = img.height;
                sw = img.height * targetRatio;
                sx = (img.width - sw) / 2;
                sy = 0;
            } else {
                // Image is taller than target area (crop top/bottom)
                sw = img.width;
                sh = img.width / targetRatio;
                sx = 0;
                sy = (img.height - sh) / 2;
            }

            ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
        }

        // --- Event Listeners for Controls --- //
        
        btnShuffle.addEventListener('click', () => {
            shuffleArray(loadedImages);
            drawGrid();
        });

        btnDownload.addEventListener('click', () => {
            if (!canvas) return;
            const link = document.createElement('a');
            link.download = `neural-grid-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });

    </script>
</body>
</html>
